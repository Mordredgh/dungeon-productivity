user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip para assets de texto
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Cache-Control por tipo de archivo
    # Exact string matches tienen prioridad sobre regex
    map $uri $dungeon_cache {
        default        "no-cache";
        /sw.js         "no-store, no-cache, must-revalidate, max-age=0";
        /manifest.json "public, max-age=3600";
        ~*\.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ "public, max-age=31536000, immutable";
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ── Security Headers ──────────────────────────────────────────
        # Previene clickjacking
        add_header X-Frame-Options "DENY" always;

        # Previene MIME-sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # XSS filter legado
        add_header X-XSS-Protection "1; mode=block" always;

        # No enviar Referer completo a sitios externos
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # HSTS — fuerza HTTPS por 2 años
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Deshabilitar features del browser no usadas (geolocation solo para clima)
        add_header Permissions-Policy "camera=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), geolocation=(self)" always;

        # Content Security Policy
        # unsafe-inline requerido: la app es vanilla JS sin bundler (onclick=, <script> inline)
        # Dominios explícitos para cada tipo de recurso
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://stdedxhxxoyostymldqn.supabase.co https://i.scdn.co; connect-src 'self' https://stdedxhxxoyostymldqn.supabase.co wss://stdedxhxxoyostymldqn.supabase.co https://api.open-meteo.com https://accounts.spotify.com https://api.spotify.com https://accounts.google.com https://www.googleapis.com https://oauth2.googleapis.com https://cdn.jsdelivr.net https://cloudflareinsights.com; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src 'none'; worker-src 'self'; manifest-src 'self'" always;

        # ── CORS — solo acepta requests del propio dominio ────────────
        add_header Access-Control-Allow-Origin "https://dungeon.mordredgh.com" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Vary "Origin" always;

        # Cache-Control según tipo de archivo (via map)
        add_header Cache-Control $dungeon_cache always;

        # Responde OPTIONS preflight sin body
        if ($request_method = OPTIONS) {
            return 204;
        }

        # SPA — todo path desconocido cae en index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
